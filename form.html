<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Student Registration Form</h2>
        <form action="action.php">

            <!-- Name -->
             <div class="form-group">
                <label for="name">Student Name:</label>
                <input type="text" name="name" required>
             </div>

             <!-- Roll no -->
              <div class="form-group">
                <label for="roll">Roll no.:</label>
                <input type="tel" name="roll" required>
              </div>

              <!-- Father's Name -->
              <div class="form-group">
                <label for="father's name">Father's Name:</label>
                <input type="text" name="father's name" required>
             </div>

             <!-- Mother's Name -->
              <div class="form-group">
                <label for="Mother's name">Mother's Name:</label>
                <input type="text" name="Mother's name" required>
             </div>

             <!-- Date of Birth -->
              <div class="form-group">
                <label for="DOB">Date of Birth:</label>
                <input type="date" name="DOB" required>
             </div>

             <!-- Mobile -->
              <div class="form-group">
                <label for="mobile">Mobile Number:</label>
                <input type="tel" name="mobile" required placeholder="9876543210">
             </div>

             <!-- Email -->
              <div class="form-group">
                <label for="email">Email ID:</label>
                <input type="email" name="email" required placeholder="student123@school.com">
              </div>

              <!-- Gender -->
               <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male" required>Male</label>

                    <label><input type="radio" name="gender" value="female" required>Female</label>
                </div>
               </div>

               <!-- Department -->
                <div class="form-group">
                    <label>Department:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox">Arts</label>

                        <label><input type="checkbox">Science</label>

                        <label><input type="checkbox">Commerce</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Student Photo:</label>
                    <input type="file" name="photo" required class="pht">
                </div>

                <div class="form-group">
                    <label for="addess">Address:</label>
                    <textarea name="addess" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <button type="submit">Register</button>
                </div>
        </form>
    </div> 
</body>
</html>
